name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  dart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Configure Flutter SDK path for Gradle
        run: echo "flutter.sdk=$FLUTTER_ROOT" > example/android/local.properties
      - name: Run Android unit tests
        working-directory: example/android
        run: ./gradlew :gptom_aidl_plugin:testDebugUnitTest
