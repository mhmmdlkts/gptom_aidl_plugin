name: gptom_aidl_plugin
description: "Anbindung der GP tom App (Global Payments SoftPOS): Kartenzahlung, Storno, Refund, Kassenschnitt, Login- und Info-Service. Android via app2app-AIDL, iOS via URL-Scheme."
version: 0.2.0
repository: https://github.com/mhmmdlkts/gptom_aidl_plugin
# Proprietär – nicht auf pub.dev veröffentlichen
publish_to: none

environment:
  sdk: ^3.6.0
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  app_links: ^6.4.1
  plugin_platform_interface: ^2.1.8
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.kreiseck.gptom_aidl_plugin
        pluginClass: GptomAidlPlugin